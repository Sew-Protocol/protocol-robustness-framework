# Forensic Hardening Configuration
# OS-specific security settings and requirements

os_specific:
  linux:
    ptrace_path: "/proc/sys/kernel/yama/ptrace_scope"
    ptrace_minimum: 3
    proc_path_template: "/proc/{pid}/status"
    description: "Linux YAMA LSM for ptrace protection"

  darwin:
    ptrace_mechanism: "SIP"
    proc_check_command: ["sysctl", "kern.proc"]
    description: "macOS System Integrity Protection"

  windows:
    ptrace_mechanism: "Process Mitigation Policies"
    proc_check_method: "WMI"
    description: "Windows process isolation policies"

hardening:
  # Minimum acceptable ptrace scope value (Linux)
  minimum_ptrace_scope: 3

  # Require process isolation check to pass
  require_proc_access: true

  # Recommended workspace permissions (octal)
  workspace_permissions: "750"

  # List of required checks for production
  production_requirements:
    - "uid"
    - "ptrace-scope"
    - "proc-isolation"
    - "fs-access"

# Environment variable reference
# PRF_EVIDENCE_USER: Expected username for evidence processes
# PRF_EVIDENCE_WORKSPACE: Isolated workspace directory path
