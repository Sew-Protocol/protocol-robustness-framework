suite_id: reference-validation-v1
title: Reference Validation Suite v1.3
status: public-candidate
version: 1.3.0
created: 2026-05
protocol_phase: DR3 built; simulation-backed hardening and gated rollout

description: >
  Canonical deterministic validation harness for Sew Protocol.
  v1.3 defines scenario set, claim mappings, expected outputs,
  verification flow, and CI checks. All 8 scenarios are simulator-backed.

public_disclosure:
  classification: deterministic-evidence-pack-harness
  simulator_backed: full
  confidence: high
  note: >
    All 8 scenarios run manifest-driven simulator replay with trace export
    and evidence invariant verification. Expected hashes are pinned.

goals:
  - Provide externally reproducible validation evidence packaging.
  - Map protocol claims to executable scenarios and expected outputs.
  - Preserve high-value adversarial cases as regression artifacts.
  - Support the Sew Trust Packet Validation & Evidence artifact.

non_goals:
  - Exhaust all possible adversarial strategies.
  - Replace contract audits.
  - Prove complete game-theoretic equilibrium.
  - Claim full simulator-backed validation coverage in v1.

repository:
  name: sew-simulation
  expected_root: suites/reference-validation-v1

pinned_inputs:
  suite_version: 1.3.0
  manifest: manifest.edn
  config_version: reference-config-v1
  economic_assumptions_version: economic-assumptions-v1
  resolver_capacity_version: resolver-capacity-v1
  chain_assumptions_version: chain-assumptions-v1

commands:
  run: make reference-validation-v1
  verify: make verify-reference-validation-v1
  clean: make clean-reference-validation-v1
  report: make report-reference-validation-v1

outputs:
  summary: actual/summary.json
  scenario_results: actual/scenario-results.json
  invariants: actual/invariants.json
  economic_results: actual/economic-results.json
  evidence_matrix: actual/evidence-matrix.json

