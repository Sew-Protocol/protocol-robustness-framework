name: Uberjar Build

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Clojure CLI
        run: |
          curl -fsSL https://download.clojure.org/install/linux-install-1.12.5.1654.sh -o /tmp/install-clojure.sh
          chmod +x /tmp/install-clojure.sh
          sudo /tmp/install-clojure.sh
      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Build prf-runner-core uberjar
        run: clojure -T:build uberjar :variant core
      - name: Build prf-runner-sew uberjar
        run: clojure -T:build uberjar :variant sew
      - name: Upload core jar
        uses: actions/upload-artifact@v4
        with:
          name: prf-runner-core
          path: target/prf-runner-core-*.jar
      - name: Upload sew jar
        uses: actions/upload-artifact@v4
        with:
          name: prf-runner-sew
          path: target/prf-runner-sew-*.jar
