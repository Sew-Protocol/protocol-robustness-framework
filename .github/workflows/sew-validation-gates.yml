name: SEW Validation Gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]

jobs:
  core-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Clojure CLI
        run: |
          curl -fsSL https://download.clojure.org/install/linux-install-1.11.1.1413.sh -o /tmp/install-clojure.sh
          chmod +x /tmp/install-clojure.sh
          sudo /tmp/install-clojure.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run canonical suite
        run: |
          set +e
          echo "=== Running unit tests ==="
          ./scripts/test.sh unit
          UNIT_EXIT=$?
          echo "Unit exit code: $UNIT_EXIT"

          echo "=== Running reference validation ==="
          clojure -M:reference-validation
          REF_EXIT=$?
          echo "Reference validation exit code: $REF_EXIT"

          echo "=== Running generators ==="
          ./scripts/test.sh generators || true

          echo "=== Running contracts ==="
          ./scripts/test.sh contracts || true

          echo "=== Running invariants ==="
          ./scripts/test.sh invariants || true

          echo "=== Running suites ==="
          ./scripts/test.sh suites || true

          echo "=== Running coverage ==="
          ./scripts/test.sh coverage || true

          echo "=== Running triage ==="
          ./scripts/test.sh triage || true

          echo "=== Running monte-carlo ==="
          ./scripts/test.sh monte-carlo || true

          FAILURES=0
          [ $UNIT_EXIT -eq 0 ] || FAILURES=$((FAILURES + 1))
          [ $REF_EXIT -eq 0 ] || FAILURES=$((FAILURES + 1))
          echo "Total gating failures: $FAILURES"
          exit $FAILURES

      - name: Generate ephemeral Ed25519 key for CI signing
        if: always()
        run: |
          ssh-keygen -t ed25519 -f test_key -N ''
          ls -l test_key*

      - name: Sign manifest with ephemeral key
        if: always()
        run: |
          mkdir -p results/ci-bundle
          clojure -M -m resolver-sim.scripts.evidence sign ./test_key || true

      - name: Verify signature with public key
        if: always()
        run: |
          ssh-keygen -e -f test_key -m PEM > test_key.pub.pem || true
          clojure -M -m resolver-sim.scripts.verify-signature test_key.pub.pem || true

      - name: Export evidence bundle (CI)
        if: always()
        run: |
          mkdir -p results/ci-bundle
          bb evidence:bundle results/ci-bundle || echo "Warning: evidence bundle export failed (run may be incomplete)"
          ls -la results/ci-bundle || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: results/test-artifacts/
          if-no-files-found: ignore

      - name: Upload evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-bundle
          path: results/ci-bundle/
          if-no-files-found: ignore

  coverage-gates:
    runs-on: ubuntu-latest
    needs: core-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Clojure CLI
        run: |
          curl -fsSL https://download.clojure.org/install/linux-install-1.11.1.1413.sh -o /tmp/install-clojure.sh
          chmod +x /tmp/install-clojure.sh
          sudo /tmp/install-clojure.sh

      - name: Run transition/guard coverage gate
        env:
          MAX_UNHIT_TRANSITIONS: "4"
        run: ./scripts/test.sh coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifact
          path: results/test-artifacts/coverage.json

  adversarial-surfaces:
    runs-on: ubuntu-latest
    needs: core-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run profitability sweep
        run: ./scripts/test.sh adversarial-sweep

      - name: Run adversarial artifact gates
        run: ./scripts/test.sh adversarial-gates

      - name: Upload profitability surfaces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profitability-surfaces
          path: results/profitability-surfaces/

  equivalence-comparison-gates:
    runs-on: ubuntu-latest
    needs: [core-validation, comparison-schema-gates]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Clojure CLI
        run: |
          curl -fsSL https://download.clojure.org/install/linux-install-1.11.1.1413.sh -o /tmp/install-clojure.sh
          chmod +x /tmp/install-clojure.sh
          sudo /tmp/install-clojure.sh

      - name: Run equivalence comparison gates
        run: ./scripts/test.sh equivalence-new

      - name: Upload equivalence test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: equivalence-test-artifacts
          path: results/test-artifacts/

  comparison-schema-gates:
    runs-on: ubuntu-latest
    needs: core-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run comparison metadata lint
        run: ./scripts/test.sh comparison-lint

      - name: Upload comparison lint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison-lint-artifacts
          path: results/test-artifacts/
