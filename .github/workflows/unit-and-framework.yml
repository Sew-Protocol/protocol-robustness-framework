name: Unit and Framework Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  unit-and-framework:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        run: |
          curl -fsSL https://download.clojure.org/install/linux-install-1.11.1.1413.sh -o /tmp/install-clojure.sh
          chmod +x /tmp/install-clojure.sh
          sudo /tmp/install-clojure.sh

      - name: Install Babashka
        run: |
          curl -fsSL https://raw.githubusercontent.com/babashka/babashka/master/install -o /tmp/install-bb.sh
          chmod +x /tmp/install-bb.sh
          sudo /tmp/install-bb.sh

      - name: Run framework unit tests (no Sew protocol)
        run: bb test:framework

      - name: Run full unit tests (framework + Sew)
        run: bb test:unit
