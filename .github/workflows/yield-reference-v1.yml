name: Yield Reference Suite v1

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  yield-reference-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        run: |
          curl -fsSL https://download.clojure.org/install/linux-install-1.11.1.1413.sh -o /tmp/install-clojure.sh
          chmod +x /tmp/install-clojure.sh
          sudo /tmp/install-clojure.sh

      - name: Clean previous artifacts
        run: rm -rf suites/yield-reference-v1/actual

      - name: Run yield reference suite
        run: make yield-reference-v1

      - name: Verify yield reference outputs
        run: |
          echo "Checking actual/ exists..."
          ls -la suites/yield-reference-v1/actual/ || true
          echo "Running verify..."
          ./suites/yield-reference-v1/scripts/verify.sh

      - name: Upload yield reference artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yield-reference-artifacts
          path: suites/yield-reference-v1/actual/
