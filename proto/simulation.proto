syntax = "proto3";

import "google/protobuf/struct.proto";

// Service contract documentation for the generic Simulation Engine.
//
// This file is DOCUMENTATION ONLY. The Clojure server uses io.grpc with a
// JSON Marshaller — no protoc compilation is performed. The Python client
// uses grpcio channel.unary_unary with custom JSON serializers.
//
// Wire format: UTF-8 JSON. All keys are snake_case on the wire.
// Clojure server converts snake_case → kebab-case internally and back on response.
//
// Authority model: Clojure is the SOLE source of truth.
//   - Python sends events; Clojure executes them against the real state machine.
//   - All invariant checks are performed in Clojure only.
//   - Python never holds world state; it receives a world_view snapshot per step.
//
// Protocol generality:
//   - protocol_params is a google.protobuf.Struct — any protocol-specific config.
//   - world_view is a google.protobuf.Struct — protocol-specific world snapshot.
//   - Action names are open strings enforced by the Clojure dispatch-action multimethod.

package simulation.engine;

// ─────────────────────────────────────────────────────────────────────────────
// Service
// ─────────────────────────────────────────────────────────────────────────────

service SimulationEngine {
  // Allocate a new session: build world0, index agents, set block-time.
  rpc StartSession    (StartRequest)   returns (StartResponse);
  // Execute one event against the session's canonical world state.
  rpc Step            (StepRequest)    returns (StepResponse);
  // Query the full internal world state of a session.
  rpc GetSessionState (GetStateRequest) returns (GetStateResponse);
  // Destroy a session and free its resources.
  rpc DestroySession  (DestroyRequest) returns (DestroyResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// AdvisoryService — optional protocol-specific analysis (no state mutation)
//
// These RPCs call DisputeProtocol/advisory with the matching request-type.
// Non-advisory protocols return not_supported = true in the response.
// ─────────────────────────────────────────────────────────────────────────────

service AdvisoryService {
  // Return action templates for an actor given the current world state.
  // (SEW: suggests create_escrow, raise_dispute, execute_resolution, etc.)
  rpc SuggestActions          (SuggestActionsRequest)    returns (SuggestActionsResponse);

  // Return read-only risk/economic signals (SEW: stakes, slashes, held totals).
  rpc SessionSignals          (SessionSignalsRequest)    returns (SessionSignalsResponse);

  // Return a realised payoff projection for an actor (SEW: stake + claimable - slashed).
  rpc EvaluatePayoff          (EvaluatePayoffRequest)    returns (EvaluatePayoffResponse);

  // Evaluate an objective-oriented score for adversarial strategy search
  // (SEW default objective: resolver_fraud_profit).
  rpc EvaluateAttackObjective (EvaluateAttackRequest)    returns (EvaluateAttackResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// StartSession
// ─────────────────────────────────────────────────────────────────────────────

message StartRequest {
  string         session_id         = 1;
  repeated Agent agents             = 2;
  // protocol_params is an open map of protocol-specific configuration.
  // For SEW: {resolver_fee_bps: 50, appeal_window_duration: 0, ...}
  // For other protocols: any keys accepted by their build-execution-context.
  google.protobuf.Struct protocol_params = 3;
  int64          initial_block_time = 4;  // block timestamp for world0
  string         protocol_id        = 5;  // e.g. "sew-v1" (defaults to "sew-v1" if omitted)
}

message Agent {
  string id      = 1;  // logical name used in events ("buyer1")
  string address = 2;  // protocol-specific address ("0x...")
  string role    = 3;  // "buyer" | "seller" | "resolver" | "gov" etc.
  string strategy = 4; // "honest" | "malicious" | "collusive" etc.
}

message StartResponse {
  string session_id = 1;
  bool   ok         = 2;
  string error      = 3;  // null on success
}

// ─────────────────────────────────────────────────────────────────────────────
// Step
// ─────────────────────────────────────────────────────────────────────────────

message StepRequest {
  string session_id = 1;
  Event  event      = 2;
}

message Event {
  int32  seq    = 1;  // monotonically increasing per session (0-based)
  int64  time   = 2;  // absolute block timestamp
  string agent  = 3;  // agent id (must be in session's agent list)
  // action is an open string dispatched by the protocol's dispatch-action method.
  // For SEW: "create_escrow", "raise_dispute", "execute_resolution", etc.
  // For other protocols: any action string their dispatch-action accepts.
  string action = 4;
  // params is an open map; fields vary by action and protocol.
  google.protobuf.Struct params = 5;
}

message StepResponse {
  string session_id = 1;

  // "ok" | "rejected" | "invariant_violated" | "error"
  string result = 2;

  // Protocol-specific lean snapshot of world state after this step (nil on halt).
  // Populated via DisputeProtocol.io-projection(:world-view).
  // Common fields across protocols:
  //   block_time   : int64  — current simulated block timestamp
  //   entity_count : int32  — number of live protocol entities
  //   pending_count: int32  — number of entities with pending transitions
  google.protobuf.Struct world_view = 3;

  // Full step trace entry from Clojure process-step (mirrors replay trace).
  TraceEntry trace_entry = 4;

  // true when the simulation has halted due to an invariant violation.
  bool halted = 5;

  // non-null only when result == "error" (server-level error, not a revert).
  string error = 6;
}

message TraceEntry {
  int32  seq           = 1;
  int64  time          = 2;
  string agent         = 3;
  string action        = 4;
  string result        = 5;  // "ok" | "rejected" | "invariant_violated"
  string error         = 6;  // null when result == "ok"
  bool   invariants_ok = 7;
  // extra is an open map (e.g. {workflow_id: 0} for create_escrow)
  // violations is a nested map of invariant results when invariants_ok == false
}

// ─────────────────────────────────────────────────────────────────────────────
// GetSessionState
// ─────────────────────────────────────────────────────────────────────────────

message GetStateRequest {
  string session_id = 1;
}

message GetStateResponse {
  string session_id = 1;
  bool   ok         = 2;
  string error      = 3;
  // The full internal world map (pure Clojure state) as a JSON object.
  google.protobuf.Struct world = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// DestroySession
// ─────────────────────────────────────────────────────────────────────────────

message DestroyRequest {
  string session_id = 1;
}

message DestroyResponse {
  string session_id = 1;
  bool   ok         = 2;
  string error      = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// AdvisoryService messages
// ─────────────────────────────────────────────────────────────────────────────

message SuggestActionsRequest {
  string session_id = 1;
  string actor_id   = 2;
}

message SuggestActionsResponse {
  bool   ok         = 1;
  string session_id = 2;
  string actor_id   = 3;
  // Protocol-specific suggestions list; shape defined by the protocol's advisory impl.
  google.protobuf.Struct suggestions = 4;
  // true if the protocol does not implement :suggest-actions
  bool not_supported = 5;
  string error       = 6;
}

message SessionSignalsRequest {
  string session_id = 1;
}

message SessionSignalsResponse {
  bool   ok         = 1;
  string session_id = 2;
  // Protocol-specific signal map; shape defined by the protocol's advisory impl.
  google.protobuf.Struct signals = 3;
  bool not_supported = 4;
  string error       = 5;
}

message EvaluatePayoffRequest {
  string session_id = 1;
  string actor_id   = 2;
}

message EvaluatePayoffResponse {
  bool   ok         = 1;
  string session_id = 2;
  // Protocol-specific payoff breakdown; shape defined by the protocol's advisory impl.
  google.protobuf.Struct payoff = 3;
  bool not_supported = 4;
  string error       = 5;
}

message EvaluateAttackRequest {
  string session_id = 1;
  string actor_id   = 2;
  // Protocol-specific objective label (e.g. "resolver_fraud_profit" for SEW).
  string objective  = 3;
}

message EvaluateAttackResponse {
  bool   ok         = 1;
  string session_id = 2;
  double score      = 3;
  // Protocol-specific decomposition of the score.
  google.protobuf.Struct decomposition = 4;
  bool not_supported = 5;
  string error       = 6;
}
